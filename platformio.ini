[platformio]
src_dir = .
default_envs = device1

; ============================================================
; 共通設定（全デバイス共通）
; ============================================================
[env]
platform  = espressif32@^6.9.0    ; IDF 5.x（BLE5 Extended Adv に必須）
board     = esp32-s3-devkitc-1
board_build.flash_mode = dio
board_upload.flash_size = 4MB
framework = arduino

upload_speed  = 921600
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit NeoMatrix@^1.3.2
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0.0
    mathertel/OneButton@^2.0.3
    lewisxhe/SensorLib@^0.4.1

board_build.partitions = partitions.csv
board_build.filesystem = littlefs

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DCONFIG_BT_BLE_50_FEATURES_SUPPORTED=1

; ============================================================
; USB 有線書き込み
;   python3 scripts/upload.py 1  → Device 1 (env:device1) に書き込み
;   python3 scripts/upload.py 2  → Device 2 (env:device2) に書き込み
;   （対応する MAC アドレスは scripts/upload.py の DEVICES を編集）
; ============================================================
[env:device1]

[env:device2]

; ============================================================
; OTA 書き込み（WiFi）
;   ※ PC が ESP32 と同じ WiFi に接続されていることを確認すること
;     （接続を試みる SSID/パスワードは Secrets.h で設定）
;
;   使い方:
;     python3 scripts/upload_ota.py
;       → OTAモード（LED緑色）になっている全台を自動検出して書き込む
;
;   手動で特定のデバイスに書き込む場合:
;     pio run -e turnie_ota -t upload --upload-port <IPアドレス>
; ============================================================
[env:turnie_ota]
upload_protocol = espota
; upload_port は upload_ota.py が自動設定するため空欄
; 手動指定例: upload_port = 192.168.10.17
